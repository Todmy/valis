version: "3.8"

# Teamind Community Edition — Self-hosted
# Usage: docker compose up -d
# Then:  teamind init (choose Community, enter localhost URLs)

services:
  # PostgreSQL with auto-applied migrations
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: teamind
      POSTGRES_USER: teamind
      POSTGRES_PASSWORD: teamind_local_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant vector search
  qdrant:
    image: qdrant/qdrant:v1.12.1
    restart: unless-stopped
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
